<div class="dispatch-shell">
  @if (facade.connection$ | async; as conn) {
    <app-dispatch-header [metrics]="metrics" [connectionState]="conn" />

    @if (conn === 'disconnected') {
      <div class="dispatch-banner" role="alert" aria-live="assertive">
        Atualizações em tempo real interrompidas. Os dados exibidos podem estar desatualizados.
      </div>
    }

    @if (facade.loading()) {
      <div class="dispatch-loading" role="status" aria-label="Carregando cenário">
        <div class="dispatch-loading__skeleton dispatch-loading__skeleton--list"></div>
        <div class="dispatch-loading__skeleton dispatch-loading__skeleton--map"></div>
        <div class="dispatch-loading__skeleton dispatch-loading__skeleton--detail"></div>
      </div>
    } @else if (facade.error()) {
      <div class="dispatch-error" role="alert">
        <p>{{ facade.error() }}</p>
        <button type="button" (click)="facade.retry()">Tentar novamente</button>
      </div>
    } @else {
      <main class="dispatch-main" id="main-content">
        <app-delivery-list
          [deliveries]="deliveries"
          [couriers]="couriers"
          [selectedCourierId]="facade.selectedCourierId()"
          [filter]="mapFilter"
          (selectCourier)="onSelect($event)"
          (filterChange)="onFilterChange($event)"
        />
        <app-dispatch-map
          [bounds]="facade.mapBounds()"
          [couriers]="couriers"
          [landmarks]="landmarks"
          [selectedId]="facade.selectedCourierId()"
          [filter]="mapFilter"
          (filterChange)="onFilterChange($event)"
          (selectCourier)="onSelect($event)"
        />
        <app-courier-detail
          [detail]="mergedDetail"
          [reconnectNotice]="reconnectNotice"
          (closed)="onCloseDetail()"
        />
      </main>
    }

    <app-dispatch-footer [connectionState]="conn" [bounds]="facade.mapBounds()" />
  }
</div>
