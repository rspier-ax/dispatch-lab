@if (facade.loading()) {
  <app-dispatch-boot />
} @else if (facade.error()) {
  <div class="dispatch-error" role="alert">
    <p>{{ facade.error() }}</p>
    <button type="button" (click)="facade.retry()">Tentar novamente</button>
  </div>
} @else {
  @if (facade.connection$ | async; as conn) {
    <div class="dispatch-shell">
      <app-dispatch-header [metrics]="metrics" [connectionState]="conn" />

      @if (conn === 'disconnected') {
        <div class="dispatch-banner" role="alert" aria-live="assertive">
          Atualizações em tempo real interrompidas. Os dados exibidos podem estar desatualizados.
        </div>
      }

      <main class="dispatch-main" id="main-content">
        <app-delivery-list
          [deliveries]="deliveries"
          [couriers]="couriers"
          [selectedCourierId]="facade.selectedCourierId()"
          [filter]="mapFilter"
          (selectCourier)="onSelect($event)"
          (filterChange)="onFilterChange($event)"
        />
        <app-dispatch-map
          [bounds]="facade.mapBounds()"
          [couriers]="couriers"
          [landmarks]="landmarks"
          [selectedId]="facade.selectedCourierId()"
          [filter]="mapFilter"
          [showBoundsOverlay]="demoMapPrefs.showBoundsOverlay"
          [showRoutePolyline]="demoMapPrefs.showRoutePolyline"
          [highlightCourierId]="demoMapPrefs.highlightCourierId"
          [demoCenterOpen]="demoCenterOpen"
          [demoInfo]="demoInfo"
          [demoTick]="simTick"
          [demoEvents]="streamEvents"
          [demoMapPrefs]="demoMapPrefs"
          (filterChange)="onFilterChange($event)"
          (selectCourier)="onSelect($event)"
          (toggleDemoCenter)="onToggleDemoCenter()"
          (demoClosed)="onCloseDemoCenter()"
          (demoFocusCourier)="onDemoFocusCourier($event)"
          (demoApplyScenario)="onScenarioApplied($event)"
          (demoMapPrefsChange)="onDemoMapPrefsChange($event)"
          (demoRefreshed)="onDemoRefreshed()"
        />
        <div class="dispatch-detail-column">
          <app-courier-detail
            [detail]="mergedDetail"
            [reconnectNotice]="reconnectNotice"
            (closed)="onCloseDetail()"
          />
        </div>
      </main>
    </div>
  }
}
