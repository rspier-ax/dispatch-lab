<div class="map-shell">
  <div
    #mapHost
    class="map-host"
    [class.map-host--ready]="mapViewReady"
    role="application"
    aria-label="Mapa de entregadores POA Centro"
  ></div>

  <div class="map-overlay map-overlay--top-left">
    <button type="button" class="map-btn" aria-label="Enquadrar mapa na área do Centro Histórico" (click)="fitOperationArea()">
      Enquadrar mapa
    </button>
    <button
      type="button"
      class="map-btn map-btn--primary"
      [class.map-btn--active]="demoCenterOpen"
      [attr.aria-pressed]="demoCenterOpen"
      (click)="toggleDemoCenter.emit()"
    >
      Central da demo
    </button>
  </div>

  <div class="map-overlay map-overlay--top-right" role="group" aria-label="Filtrar marcadores no mapa">
    @for (opt of filterOptions; track opt.value) {
      <button
        type="button"
        class="map-pill"
        [class.map-pill--active]="filter === opt.value"
        [attr.aria-pressed]="filter === opt.value"
        (click)="onFilterClick(opt.value)"
      >
        {{ opt.label }}
      </button>
    }
  </div>

  <div class="map-overlay map-overlay--bottom-left map-legend" aria-label="Legenda do mapa">
    <span class="map-legend__item"><span class="map-legend__dot map-legend__dot--live"></span> Ao vivo</span>
    <span class="map-legend__item"><span class="map-legend__dot map-legend__dot--stale"></span> Sinal atrasado</span>
    <span class="map-legend__item"><span class="map-legend__dot map-legend__dot--offline"></span> Sem sinal</span>
  </div>

  @if (bounds) {
    <div class="map-overlay map-overlay--bottom-info" aria-label="Metadados do cenário">
      <span>Centro Histórico · POA Centro</span>
      @if (bboxLabel) {
        <span class="mono">{{ bboxLabel }}</span>
      }
      <span class="map-meta">Demo v1.0.0</span>
    </div>
  }

  <app-demo-center-panel
    [open]="demoCenterOpen"
    [demoInfo]="demoInfo"
    [tick]="demoTick"
    [platformFeed]="demoPlatformFeed"
    [upcomingScripts]="demoUpcomingScripts"
    [tickIntervalMs]="demoTickIntervalMs"
    [deliveries]="demoDeliveries"
    [couriers]="couriers"
    [selectedCourierId]="selectedId"
    [mapPrefs]="demoMapPrefs"
    [refreshDemo]="refreshDemo"
    [reloadDemoInfo]="reloadDemoInfo"
    (closed)="demoClosed.emit()"
    (applyScenario)="demoApplyScenario.emit($event)"
    (focusCourier)="demoFocusCourier.emit($event)"
    (mapPrefsChange)="demoMapPrefsChange.emit($event)"
  />
</div>
