<section class="list-panel" aria-labelledby="deliveries-heading">
  <header class="list-panel__header">
    <div class="list-panel__title-row">
      <h2 id="deliveries-heading">Entregas ativas</h2>
      <span class="list-panel__count">{{ rows.length }}</span>
    </div>
    <div class="list-panel__controls">
      <label class="sr-only" for="delivery-search">Buscar entregas</label>
      <input
        id="delivery-search"
        type="search"
        class="list-panel__search"
        placeholder="Buscar ID, restaurante, entregador…"
        [(ngModel)]="searchQuery"
        autocomplete="off"
      />
      <label class="sr-only" for="delivery-filter">Filtrar por estado</label>
      <select
        id="delivery-filter"
        class="list-panel__filter"
        [ngModel]="filter"
        (ngModelChange)="onFilterChange($event)"
      >
        @for (opt of filterOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
  </header>

  @if (rows.length === 0) {
    <p class="list-panel__empty">Nenhuma entrega corresponde aos filtros.</p>
  } @else {
    <ul class="delivery-list" role="listbox" aria-label="Lista de entregas">
      @for (row of rows; track row.delivery.id) {
        <li role="presentation">
          <button
            type="button"
            class="delivery-item"
            [class.delivery-item--selected]="row.delivery.courier_id === selectedCourierId"
            [class.delivery-item--live]="row.trackingState === 'live'"
            [class.delivery-item--stale]="row.trackingState === 'stale'"
            [class.delivery-item--offline]="row.trackingState === 'offline'"
            [attr.aria-selected]="row.delivery.courier_id === selectedCourierId"
            role="option"
            (click)="selectCourier.emit(row.delivery.courier_id)"
          >
            <span class="delivery-item__bar" aria-hidden="true"></span>
            <span class="delivery-item__body">
              <span class="delivery-item__top">
                <span class="delivery-item__id">{{ row.delivery.id }}</span>
                <span class="delivery-item__badges">
                  @if (isQueued(row.delivery, couriers)) {
                    <span class="delivery-item__badge delivery-item__badge--queued">Na fila</span>
                  }
                  <span class="delivery-item__badge" [class]="'delivery-item__badge--' + row.trackingState">
                    {{ trackingLabel(row.trackingState) }}
                  </span>
                </span>
              </span>
              <span class="delivery-item__name">{{ row.delivery.restaurant }}</span>
              <span class="delivery-item__meta">
                <span class="delivery-item__dot" [class]="'delivery-item__dot--' + row.trackingState" aria-hidden="true"></span>
                <span>{{ row.delivery.courier_id }} · {{ row.delivery.courier_name }}</span>
                <span>{{ deliveryMetaLabel(row.delivery, isQueued(row.delivery, couriers)) }}</span>
              </span>
            </span>
          </button>
        </li>
      }
    </ul>
  }
</section>
