<div class="dispatch-boot" role="status" aria-live="polite" aria-label="Carregando operação POA Centro">
  <div class="dispatch-boot__brand">
    <svg class="dispatch-boot__logo" width="36" height="36" viewBox="0 0 28 28" aria-hidden="true">
      <rect x="2" y="2" width="10" height="10" rx="2" fill="#1672e8" />
      <rect x="16" y="2" width="10" height="10" rx="2" fill="#19a35b" opacity="0.9" />
      <rect x="9" y="16" width="10" height="10" rx="2" fill="#f2a900" opacity="0.95" />
    </svg>
    <div>
      <p class="dispatch-boot__title">DispatchLab</p>
      <p class="dispatch-boot__region">POA Centro</p>
    </div>
  </div>

  <p class="dispatch-boot__message">
    <app-spinner size="sm" />
    {{ message }}
  </p>

  <div class="dispatch-boot__progress" aria-hidden="true">
    <div class="dispatch-boot__progress-bar"></div>
  </div>

  <div class="dispatch-boot__skeleton" aria-hidden="true">
    <div class="dispatch-boot__skeleton-col"></div>
    <div class="dispatch-boot__skeleton-col dispatch-boot__skeleton-col--map"></div>
    <div class="dispatch-boot__skeleton-col"></div>
  </div>
</div>
